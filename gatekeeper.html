<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>h·e·r collab · Restricted Access</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-color: #fcfcfc;
            --text-color: #212529;
            --text-strong: #000000;
            --text-muted: #6c757d;
            --brand-color: #000000;
            --accent-color: #b22222;
            --border-color: rgba(0, 0, 0, 0.1);
            --tile-bg: rgba(255, 255, 255, 0.92);
            --tile-shadow: rgba(0, 0, 0, 0.06);
            --bg-overlay: rgba(252, 252, 252, 0.75);
            --overlay-color: rgba(255, 255, 255, 0.55);
            --input-bg: rgba(0, 0, 0, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #f8f9fa;
                --text-strong: #ffffff;
                --text-muted: #a7a9be;
                --brand-color: #ffffff;
                --accent-color: #e44d4d;
                --border-color: rgba(255, 255, 255, 0.1);
                --tile-bg: rgba(26, 26, 26, 0.92);
                --tile-shadow: rgba(0, 0, 0, 0.3);
                --bg-overlay: rgba(18, 18, 18, 0.75);
                --overlay-color: rgba(0, 0, 0, 0.55);
                --input-bg: rgba(255, 255, 255, 0.06);
            }

            body[data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f8f9fa;
            --text-strong: #ffffff;
            --text-muted: #a7a9be;
            --brand-color: #ffffff;
            --accent-color: #e44d4d;
            --border-color: rgba(255, 255, 255, 0.1);
            --tile-bg: rgba(26, 26, 26, 0.92);
            --tile-shadow: rgba(0, 0, 0, 0.3);
                --bg-overlay: rgba(18, 18, 18, 0.75);
                --overlay-color: rgba(0, 0, 0, 0.55);
                --input-bg: rgba(255, 255, 255, 0.06);
            }

            body[data-theme="light"] {
            --bg-color: #fcfcfc;
            --text-color: #212529;
            --text-strong: #000000;
            --text-muted: #6c757d;
            --brand-color: #000000;
            --accent-color: #b22222;
            --border-color: rgba(0, 0, 0, 0.1);
            --tile-bg: rgba(255, 255, 255, 0.92);
            --tile-shadow: rgba(0, 0, 0, 0.06);
            --bg-overlay: rgba(252, 252, 252, 0.75);
            --overlay-color: rgba(255, 255, 255, 0.55);
            --input-bg: rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: Calibri, Candara, Segoe, "Segoe UI", Optima, Arial, sans-serif;
            color: var(--text-color);
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Smooth Background Slideshow */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: scale(1.03);
            animation: crossfade 18s infinite ease-in-out;
        }

        .bg-slide:nth-child(1) {
            background-image: url("https://res.cloudinary.com/dmkhsyfzf/image/upload/q_auto/f_auto/v1776286873/Neo_Segola_tvcbhe.jpg");
            animation-delay: 0s;
        }

        .bg-slide:nth-child(2) {
            background-image: url("https://res.cloudinary.com/dmkhsyfzf/image/upload/v1774279518/Chaz_Pigou_ejulac.png");
            animation-delay: 6s;
        }

        .bg-slide:nth-child(3) {
            background-image: url("https://res.cloudinary.com/dmkhsyfzf/image/upload/v1774279520/Tsholofelo_M%C3%BCller_rbqonz.png");
            animation-delay: 12s;
        }

        @keyframes crossfade {
            0% { opacity: 0; transform: scale(1.03); }
            10% { opacity: 0.35; transform: scale(1.06); }
            33% { opacity: 0.35; transform: scale(1.12); }
            43% { opacity: 0; transform: scale(1.15); }
            100% { opacity: 0; transform: scale(1.03); }
        }

        .bg-overlay-tint {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        /* Dimming overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay-color);
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
            z-index: 1;
        }

        /* Modal card — styled like a popup over index */
        .modal {
            position: relative;
            z-index: 2;
            background: var(--tile-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 2.5rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 24px 48px var(--tile-shadow);
            text-align: center;
        }

        .modal-lock {
            width: 2rem;
            height: 2rem;
            margin: 0 auto 1rem;
            color: var(--accent-color);
            opacity: 0.8;
            display: block;
        }

        .modal h2 {
            font-family: Georgia, serif;
            font-weight: 400;
            font-size: 1.4rem;
            color: var(--text-strong);
            letter-spacing: -0.3px;
            margin-bottom: 0.4rem;
        }

        .modal-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .modal-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-color);
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            letter-spacing: 0.1em;
        }

        .modal-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(180, 34, 34, 0.15);
        }

        body[data-theme="dark"] .modal-input:focus {
            box-shadow: 0 0 0 2px rgba(228, 77, 77, 0.2);
        }

        .modal-actions {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            margin-top: 0.75rem;
        }

        .modal-btn {
            padding: 0.65rem 1.5rem;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.15s ease;
        }

        .modal-btn-primary {
            color: #ffffff;
            background: var(--accent-color);
        }

        .modal-btn-secondary {
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border-color);
        }

        .modal-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .modal-btn:active {
            transform: translateY(0);
        }

        .modal-error {
            color: var(--accent-color);
            font-size: 0.78rem;
            margin-top: 0.75rem;
            display: none;
            font-weight: 500;
        }

        .modal-footer {
            margin-top: 1.25rem;
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.45;
        }

        /* ── Asset Picker (second modal) ── */
        .modal-picker {
            display: none;
            position: relative;
            z-index: 2;
            background: var(--tile-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 2.5rem 2.5rem 2rem;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 24px 48px var(--tile-shadow);
            text-align: center;
            animation: fadeIn 0.35s ease;
        }

        .modal-picker.visible {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .modal-picker h2 {
            font-family: Georgia, serif;
            font-weight: 400;
            font-size: 1.4rem;
            color: var(--text-strong);
            letter-spacing: -0.3px;
            margin-bottom: 0.2rem;
        }

        .picker-tag {
            font-style: italic;
            font-size: 0.85rem;
            color: var(--accent-color);
            letter-spacing: 0.05em;
            margin-bottom: 0.15rem;
        }

        .picker-desc {
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .asset-slot {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.85rem;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .asset-slot:hover {
            background: var(--tile-bg);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(180, 34, 34, 0.1);
        }

        body[data-theme="dark"] .asset-slot:hover {
            box-shadow: 0 0 0 2px rgba(228, 77, 77, 0.15);
        }

        .asset-slot-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-strong);
            letter-spacing: 0.02em;
        }

        .asset-slot-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.2rem;
        }

        .asset-slot-sub {
            font-size: 0.82rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .asset-slot-badge {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #2e7d32;
            background: rgba(46, 125, 50, 0.1);
            border: 1px solid rgba(46, 125, 50, 0.25);
            border-radius: 3px;
            padding: 0.15rem 0.6rem;
            transition: background 0.2s ease;
        }

        body[data-theme="dark"] .asset-slot-badge {
            color: #66bb6a;
            background: rgba(102, 187, 106, 0.1);
            border-color: rgba(102, 187, 106, 0.25);
        }

        .asset-slot:hover .asset-slot-badge {
            background: rgba(46, 125, 50, 0.18);
        }

        body[data-theme="dark"] .asset-slot:hover .asset-slot-badge {
            background: rgba(102, 187, 106, 0.18);
        }

        .picker-footer {
            margin-top: 1.25rem;
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.45;
        }

        @media (max-width: 480px) {
            .modal,
            .modal-picker { padding: 1.75rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="bg-slideshow">
    <div class="bg-slide"></div>
    <div class="bg-slide"></div>
    <div class="bg-slide"></div>
</div>
<div class="bg-overlay-tint"></div>

<div class="overlay"></div>

<div class="modal">
    <svg class="modal-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>

    <h2>Restricted Access</h2>
    <p class="modal-desc">Enter the access key to view the presentation deck.</p>

    <input class="modal-input" type="password" id="passKey" placeholder="Access key" autocomplete="off" />
    <div class="modal-actions">
        <button class="modal-btn modal-btn-primary" id="enter-btn">Enter</button>
        <button class="modal-btn modal-btn-secondary" id="cancel-btn">Cancel</button>
    </div>

    <p class="modal-error" id="error">Invalid access key</p>

    <div class="modal-footer">&copy; 2026 h·e·r collab</div>
</div>

<!-- ── Asset Picker (second modal) ── -->
<div class="modal-picker" id="picker">

    <h2>Asset Airlock</h2>
    <p class="picker-tag">Interactive Growth Decks</p>
    <p class="picker-desc">Strategic Partnerships</p>

    <a class="asset-slot" href="assets/fractional_agency_deck_16x9.html">
        <div class="asset-slot-title">The Fractional Agency</div>
        <div class="asset-slot-meta">
            <span class="asset-slot-sub">16 x 9 Deck</span>
            <span class="asset-slot-badge">Available</span>
        </div>
    </a>

    <a class="asset-slot" href="assets/fractional_agency_deck_9x16.html">
        <div class="asset-slot-title">The Fractional Agency</div>
        <div class="asset-slot-meta">
            <span class="asset-slot-sub">9 x 16 Deck</span>
            <span class="asset-slot-badge">Available</span>
        </div>
    </a>

    <div class="picker-footer">&copy; 2026 h·e·r collab</div>
</div>

<script>
    (function() {
        // Match index.html theme
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
        var saved = localStorage.getItem("theme-preference");
        var theme = saved === "light" || saved === "dark" ? saved : (prefersDark.matches ? "dark" : "light");
        document.body.dataset.theme = theme;

        function checkAccess() {
            var key = document.getElementById("passKey").value;
            if (key === "AgencyGrowth2026") {
                // Hide password modal, show asset picker
                document.querySelector(".modal").style.display = "none";
                document.getElementById("picker").classList.add("visible");
                document.getElementById("error").style.display = "none";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }

        document.getElementById("enter-btn").addEventListener("click", checkAccess);

        document.getElementById("passKey").addEventListener("keydown", function(e) {
            if (e.key === "Enter") checkAccess();
        });

        document.getElementById("cancel-btn").addEventListener("click", function() {
            document.body.style.transition = "opacity 0.25s ease";
            document.body.style.opacity = "0";
            setTimeout(function() {
                window.location.href = "index.html";
            }, 250);
        });

        document.getElementById("passKey").focus();
    })();
</script>
</body>
</html>
