                    <div class="bg-gradient-to-br from-brand-panel to-black border border-white/10 p-4 rounded-xl flex flex-col shadow-lg relative overflow-hidden group hover:border-brand-highlight transition-all">
                        <div class="space-y-1">
                            <div class="text-[10px] font-bold tracking-widest text-brand-muted uppercase">${c.tier}</div>
                            <div class="text-xl font-extrabold text-white tracking-tight group-hover:text-brand-highlight transition-colors">${c.rate}</div>
                        </div>
                        <div class="flex-1 min-h-[0.5rem]"></div>
                        <div class="text-[11px] text-brand-muted font-light leading-relaxed border-t border-white/5 pt-2">${c.target}</div>
                    </div>
                `,
            )
            .join("");
          html = `
                    <div class="space-y-4">
                        <div class="flex flex-col space-y-1 border-b border-white/5 pb-3">
                            <h2 class="text-xl md:text-2xl font-bold tracking-tight text-white uppercase">${slide.title}</h2>
                            <span class="text-lg md:text-xl font-serif italic text-brand-accent font-medium tracking-wide">${slide.subtitle}</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-1">
                            ${cardsHtml}
                        </div>
                    </div>
                `;
        } else if (slide.type === "airlock-grid") {
          let itemsHtml = slide.items
            .map(
              (item) => `
                    <div class="bg-white/[0.02] border border-white/5 p-3.5 rounded-lg flex gap-3 items-start hover:border-white/10 transition-all">
                        <div class="text-lg bg-white/5 p-1.5 rounded-md leading-none">${item.icon}</div>
                        <div class="space-y-0.5">
                            <div class="text-xs font-bold text-white uppercase tracking-wider">${item.title}</div>
                            <div class="text-[10.5px] text-brand-muted leading-relaxed font-light">${item.desc}</div>
                        </div>
                    </div>
                `,
            )
            .join("");
          html = `
                    <div class="space-y-4">
                        <div class="flex flex-col space-y-1 border-b border-white/5 pb-3">
                            <h2 class="text-xl md:text-2xl font-bold tracking-tight text-white uppercase">${slide.title}</h2>
                            <span class="text-lg md:text-xl font-serif italic text-brand-accent font-medium tracking-wide">${slide.subtitle}</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 pt-1">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
        }

        // Universal Flagship Driver Banner
        html += `
                <div class="mt-4 pt-3 border-t border-white/5 flex items-center gap-3 bg-brand-panel/40 px-4 py-2.5 rounded-lg border border-white/5">
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-highlight opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-brand-highlight"></span>
                    </span>
                    <span class="text-[11px] uppercase tracking-widest text-white font-bold flex-shrink-0">Partnership Lever &bull;</span>
                    <span class="text-[11px] text-brand-muted font-medium">${slide.driver}</span>
                </div>
            `;

        area.innerHTML = html;
        updateDots();
      }

      function updateDots() {
        const dotsContainer = document.getElementById("navigation-dots");
        dotsContainer.innerHTML = slidesData
          .map(
            (_, i) => `
                <button onclick="goToSlide(${i})" class="h-1.5 w-1.5 rounded-full bg-white/20 hover:bg-white/50 transition-all duration-200 ${i === currentIndex ? "dot-active" : ""}"></button>
            `,
          )
          .join("");
      }

      function nextSlide() {
        if (currentIndex < slidesData.length - 1) {
          currentIndex++;
          renderSlide(currentIndex);
        }
      }

      function prevSlide() {
        if (currentIndex > 0) {
          currentIndex--;
          renderSlide(currentIndex);
        }
      }

      function goToSlide(index) {
        currentIndex = index;
        renderSlide(currentIndex);
      }

      function copySlideText() {
        const slide = slidesData[currentIndex];
        const textToCopy = `[${slide.eyebrow}] ${slide.title} - ${slide.subtitle}

${slide.body || ""}

Partnership Lever: ${slide.driver}`;

        navigator.clipboard.writeText(textToCopy).then(() => {
          const btn = document.getElementById("copy-btn");
          const originalInner = btn.innerHTML;
          btn.innerHTML = `
                    <svg class="w-3.5 h-3.5 text-brand-highlight animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <span class="text-brand-highlight font-bold">Copied Content Successfully!</span>
                `;
          btn.classList.add("border-brand-highlight");
          setTimeout(() => {
            btn.innerHTML = originalInner;
            btn.classList.remove("border-brand-highlight");
          }, 2000);
        });
      }

      // Global Matrix Keyboard Listeners
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") nextSlide();
        if (e.key === "ArrowLeft") prevSlide();
      });

      // Initialize Call Stage
      renderSlide(currentIndex);
    </script>
  </body>
</html>
